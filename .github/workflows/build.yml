name: Build & Release

env:
  APP_NAME_SLUG: typing-trainer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: npm run build:win
          - os: ubuntu-latest
            cmd: npm run build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - run: npm ci
      - run: ${{ matrix.cmd }}

      - uses: actions/upload-artifact@v6
        if: matrix.os == 'windows-latest'
        with:
          name: dist-${{ env.APP_NAME_SLUG }}-exe
          path: dist/*.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          name: dist-${{ env.APP_NAME_SLUG }}-appimage
          path: dist/*.AppImage
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          name: dist-${{ env.APP_NAME_SLUG }}-deb
          path: dist/*.deb
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          name: dist-${{ env.APP_NAME_SLUG }}-rpm
          path: dist/*.rpm
          if-no-files-found: ignore
